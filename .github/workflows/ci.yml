name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - formats/openapi
          - formats/asyncapi
          - formats/graphql
          - formats/grpc
          - formats/connect
          - formats/mcp
          - formats/usage
          - formats/operationgraph
          - formats/workersrpc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: false
      - name: vet ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go vet ./...
      - name: test ${{ matrix.module }}
        working-directory: ${{ matrix.module }}
        run: go test -race -short ./...
